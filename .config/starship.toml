# diff with diff with `dwdiff -d'$"' -c (starship print-config | rg '\$all is shorthand' | psub) (starship print-config | rg 'format = .*\$git' | psub)`
format = "$username$hostname$localip$shlvl$singularity$kubernetes$nats$directory$vcsh$fossil_branch$fossil_metrics$git_branch$git_commit$git_state$git_metrics$git_status$hg_branch$hg_state$pijul_channel$docker_context$package$bun$c$cmake$cobol$cpp$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$fortran$gleam$golang$gradle$haskell$haxe$helm$java$julia$kotlin$lua$mojo$nim$nodejs$ocaml$odin$opa$perl$php$pulumi$purescript$python$quarto$raku$rlang$red$ruby$rust$scala$solidity$swift$terraform$typst$vlang$vagrant$xmake$zig$buf$guix_shell$nix_shell$conda$pixi$meson$spack$memory_usage$aws$gcloud$openstack$azure$direnv$env_var$mise$crystal$custom$sudo$time$cmd_duration$line_break$jobs$battery$status$container$netns$os$shell$character"

[time]
disabled = false

[custom.jj]
when = "jj-starship detect"
shell = ["jj-starship"]
format = "$output "
[git_branch]
disabled = true
[git_status]
disabled = true
[git_commit]
disabled = true

## starship preset no-runtime-versions
# "$schema" = 'https://starship.rs/config-schema.json'

