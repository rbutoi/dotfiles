background_opacity 0.95
background_blur    6
font_family        Iosevka Term
font_size          15.0
# theme in {light,dark}-theme.auto.conf

# let me undo in emacs
map ctrl+shift+equal                         no_op
map ctrl+shift+minus                         no_op
map ctrl+shift+backspace                     no_op
map super+equal          change_font_size all +0.5
map super+minus          change_font_size all -0.5

map super+shift+a        select_tab

editor                   emacsclient -nc
macos_option_as_alt      both
allow_remote_control     yes
tab_bar_style            powerline

scrollback_pager less -X --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

notify_on_cmd_finish unfocused

###################################
# from AI copying my tmux config: #
###################################

# clipboard_control write-clipboard write-primary read-clipboard read-primary

# enabled_layouts splits,stack

# Pass ctrl+j to the program when pressed twice
map ctrl+j>ctrl+j send_text all \x0a

# --- Navigation: tabs (tmux windows) ---
map ctrl+j>ctrl+n next_tab
map ctrl+j>ctrl+p previous_tab
map shift+alt+n   next_tab
map shift+alt+p   previous_tab
map ctrl+j>c       new_tab_with_cwd
map ctrl+j>ctrl+c  new_tab_with_cwd
map ctrl+j>l       goto_tab -1
map ctrl+j>ctrl+l  goto_tab -1

# --- Navigation: panes (kitty windows) ---
map ctrl+j>f       next_window
map ctrl+j>b       previous_window
map ctrl+j>ctrl+f  next_window
map ctrl+j>ctrl+b  previous_window

# --- Splits ---
# \ = vertical split (side by side), - = horizontal split (stacked)
map ctrl+j>backslash launch --location=vsplit --cwd=current
map alt+backslash    launch --location=vsplit --cwd=current
map ctrl+j>minus     launch --location=hsplit --cwd=current
map alt+minus        launch --location=hsplit --cwd=current
# _ = split down and zoom (split then toggle stack layout)
map ctrl+j>underscore combine : launch --location=hsplit --cwd=current : toggle_layout stack
map alt+underscore    combine : launch --location=hsplit --cwd=current : toggle_layout stack

# # --- Zoom / Fullscreen pane (mirrors C-z) ---
# map ctrl+j>ctrl+z toggle_layout stack

# --- Resizing ---
map ctrl+shift+left  resize_window narrower 4
map ctrl+shift+right resize_window wider 4
map ctrl+shift+up    resize_window taller 4
map ctrl+shift+down  resize_window shorter 4
map ctrl+j>ctrl+s    resize_window shorter 999

# # Enter resize mode with arrows after prefix
# map ctrl+j>left  resize_window narrower 4
# map ctrl+j>right resize_window wider 4
# map ctrl+j>up    resize_window taller 4
# map ctrl+j>down  resize_window shorter 4

# # --- Kill ---
map ctrl+j>k close_tab
map ctrl+j>x close_window

# --- Copy / Scroll mode ---
map ctrl+j>ctrl+space launch --stdin-source=@screen_scrollback --stdin-add-formatting --type=overlay ~/.config/kitty/scrollback-emacs.fish

# for ghostty default compatability
map cmd+shift+comma load_config_file

